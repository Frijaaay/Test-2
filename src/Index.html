	  <!-- ============ HIGH-PRIORITY SHARED UTILITIES ============ -->
	  <!-- Defined at the top of <body> to guarantee global availability to all sub-views [2] -->
	  <script>
		function escapeHtml(str) {
		  const div = document.createElement('div');
		  div.textContent = String(str == null ? '' : str);
		  return div.innerHTML;
		}

		function badgeHtml(status, id) {
		  const map = {
			'Submitted': 'badge-submitted',
			'Pending': 'badge-submitted',
			'In Testing': 'badge-testing',
			'Verified': 'badge-testing',
			'Approved': 'badge-approved',
			'Approved with Conditions': 'badge-resubmitted',
			'Completed': 'badge-approved',
			'Passed': 'badge-approved',
			'Passed with Conditions': 'badge-resubmitted',
			'Failed': 'badge-returned',
			'Returned': 'badge-returned',
			'Rejected': 'badge-returned',
			'Cancelled': 'badge-returned',
			'Return For Revision': 'badge-resubmitted',
			'Returned for Revision': 'badge-resubmitted',
			'Resubmitted': 'badge-resubmitted',
			'Draft': 'badge-resubmitted'
		  };
		  const cls = map[status] || 'badge-resubmitted';
		  const idAttr = id ? ' id="' + id + '"' : '';
		  return '<span' + idAttr + ' class="badge ' + cls + '"><span class="badge-dot"></span>' + escapeHtml(status) + '</span>';
		}

		function urlSafeB64(b64) {
		  return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
		}

		function toast(message, isError) {
		  const container = document.getElementById('toast-container');
		  if (!container) return;

		  const el = document.createElement('div');
		  el.className = 'toast ' + (isError ? 'toast-error' : 'toast-success');
		  el.textContent = String(message || '');
		  container.appendChild(el);

		  window.setTimeout(function () {
			if (el.parentNode) {
			  el.parentNode.removeChild(el);
			}
		  }, 3200);
		}

		function extractDriveFileId(value) {
		  if (!value) return '';
		  const text = String(value).trim();
		  if (!text) return '';

		  const match = text.match(/(?:\/d\/|id=)([a-zA-Z0-9_-]{10,})/);
		  return match && match[1] ? match[1] : text;
		}

		function normalizeAttachmentList(value) {
		  if (Array.isArray(value)) {
			return value.map(extractDriveFileId).filter(Boolean);
		  }

		  return String(value || '')
			.split(/[\n,;|]+/)
			.map(function (part) {
			  return extractDriveFileId(part);
			})
			.filter(Boolean);
		}

		function isPreviewableMimeType(mimeType) {
		  const mime = String(mimeType || '').toLowerCase();
		  return mime.indexOf('image/') === 0 ||
			 mime === 'application/pdf' ||
			 mime.indexOf('text/') === 0 ||
			 mime === 'application/json' ||
			 mime === 'application/xml' ||
			 mime.indexOf('+xml') !== -1;
		}

		function revokeAttachmentPreviewUrl() {
		  if (state.attachmentPreviewUrl) {
			URL.revokeObjectURL(state.attachmentPreviewUrl);
			state.attachmentPreviewUrl = '';
		  }
		}

		function closeAttachmentPreview() {
		  const viewer = document.getElementById('attachment-viewer');
		  const frame = document.getElementById('attachment-viewer-frame');
		  const image = document.getElementById('attachment-viewer-image');
		  const text = document.getElementById('attachment-viewer-text');
		  const fallback = document.getElementById('attachment-viewer-fallback');

		  if (viewer) viewer.classList.add('hidden-view');
		  if (frame) frame.removeAttribute('src');
		  if (image) image.removeAttribute('src');
		  if (text) text.textContent = '';
		  if (fallback) fallback.classList.add('hidden-view');

		  state.attachmentPreviewMime = '';
		  state.attachmentPreviewName = '';
		  document.body.style.overflow = '';
		  revokeAttachmentPreviewUrl();
		}

function openAttachmentPreview(fileData, attachmentLabel) {
		  if (!fileData || !fileData.base64Data) {
			toast('Attachment data was empty.', true);
			return;
		  }

		  revokeAttachmentPreviewUrl();

		  const bytes = atob(fileData.base64Data);
		  const buffer = new Uint8Array(bytes.length);
		  for (let i = 0; i < bytes.length; i++) {
			buffer[i] = bytes.charCodeAt(i);
		  }

		  const mimeType = String(fileData.mimeType || 'application/octet-stream');
		  const blob = new Blob([buffer], { type: mimeType });
		  const url = URL.createObjectURL(blob);
		  state.attachmentPreviewUrl = url;
		  state.attachmentPreviewName = fileData.fileName || attachmentLabel || 'Attachment';
		  state.attachmentPreviewMime = mimeType;

		  const viewer = document.getElementById('attachment-viewer');
		  const meta = document.getElementById('attachment-viewer-meta');
		  const downloadLink = document.getElementById('attachment-viewer-download');
		  const frame = document.getElementById('attachment-viewer-frame');
		  const image = document.getElementById('attachment-viewer-image');
		  const text = document.getElementById('attachment-viewer-text');
		  const fallback = document.getElementById('attachment-viewer-fallback');

		  if (meta) {
			meta.textContent = state.attachmentPreviewName + ' · ' + mimeType;
		  }

		  if (downloadLink) {
			downloadLink.href = url;
			downloadLink.download = state.attachmentPreviewName;
			downloadLink.target = '_self';
			downloadLink.onclick = function (event) {
			  event.preventDefault();
			  if (!state.attachmentPreviewUrl) {
				toast('Attachment preview is not available for download.', true);
				return;
			  }

			  const downloadAnchor = document.createElement('a');
			  downloadAnchor.href = state.attachmentPreviewUrl;
			  downloadAnchor.download = state.attachmentPreviewName;
			  downloadAnchor.style.display = 'none';
			  document.body.appendChild(downloadAnchor);
			  downloadAnchor.click();
			  document.body.removeChild(downloadAnchor);
			};
		  }

		  // Reset visibilities
		  if (frame) frame.classList.add('hidden-view');
		  if (image) image.classList.add('hidden-view');
		  if (text) text.classList.add('hidden-view');
		  if (fallback) fallback.classList.add('hidden-view');

		  // ==========================================
		  // CHROME-COMPLIANT RENDERING PIPELINE [1, 2]
		  // ==========================================
		  if (mimeType.indexOf('image/') === 0) {
			// Images are allowed inside nested iframes by Chrome
			if (image) {
			  image.src = url;
			  image.alt = state.attachmentPreviewName;
			  image.classList.remove('hidden-view');
			}
			if (viewer) viewer.classList.remove('hidden-view');
			document.body.style.overflow = 'hidden';
		  } 
		  else if (mimeType === 'application/pdf') {
			// PDFs are blocked inside nested iframes by Chrome's sandbox policy [2.4.9].
			// Bypassed securely by opening the private blob stream in a new high-priority tab [2.1.5].
			toast('Opening secure PDF preview in a new tab...', false);
			window.open(url, '_blank');
			
			// Clean up locally right away since it's now loaded in a separate browser process
			revokeAttachmentPreviewUrl();
		  } 
		  else if (isPreviewableMimeType(mimeType)) {
			// Raw Text / Log files are allowed inside nested iframes by Chrome
			if (text) {
			  text.textContent = new TextDecoder('utf-8').decode(buffer);
			  text.classList.remove('hidden-view');
			}
			if (viewer) viewer.classList.remove('hidden-view');
			document.body.style.overflow = 'hidden';
		  } 
		  else {
			// Non-previewable fallback
			if (fallback) {
			  fallback.classList.remove('hidden-view');
			}
			if (viewer) viewer.classList.remove('hidden-view');
			document.body.style.overflow = 'hidden';
		  }
		}

		function renderAttachmentButtons(containerId, attachmentValue, label) {
		  const container = document.getElementById(containerId);
		  if (!container) return;

		  container.innerHTML = '';
		  const fileIds = normalizeAttachmentList(attachmentValue);
		  if (!fileIds.length) {
			container.innerHTML = '<span class="text-[12px] text-gray-400">No ' + escapeHtml(label || 'attachment') + ' provided.</span>';
			return;
		  }

		  fileIds.forEach(function (fileId, index) {
			const button = document.createElement('button');
			button.type = 'button';
			button.className = 'file-chip';
			button.innerHTML =
			  '<span class="file-chip-ext">FILE</span>' +
			  '<span class="text-[13px] font-semibold text-gray-700 truncate flex-1 text-left">' +
				escapeHtml(label || 'Attachment') + (fileIds.length > 1 ? ' ' + (index + 1) : '') +
			  '</span>' +
			  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-gray-400 flex-shrink-0"><path d="M12 5v14M5 12l7 7 7-7"/></svg>';

			button.addEventListener('click', function () {
			  if (!state.token) {
				toast('Session token is missing. Please refresh and sign in again.', true);
				return;
			  }

			  const labelSpan = button.querySelector('span:nth-child(2)');
			  const originalLabel = labelSpan.textContent;
			  button.disabled = true;
			  labelSpan.textContent = 'Loading...';

			  google.script.run
				.withSuccessHandler(function (fileData) {
				  button.disabled = false;
				  labelSpan.textContent = originalLabel;
				  try {
					openAttachmentPreview(fileData, label || 'Attachment');
				  } catch (err) {
					toast('Could not open ' + (label || 'attachment') + '.', true);
				  }
				})
				.withFailureHandler(function (err) {
				  button.disabled = false;
				  labelSpan.textContent = originalLabel;
				  toast((err && err.message) ? err.message : 'Could not load attachment securely.', true);
				})
				.getSecureAttachment(state.token, fileId);
			});

			container.appendChild(button);
		  });
		}
	  </script>

	  <!-- ============ CLIENT-SIDE CORE ENGINE ============ -->
	<script>
		// ============ STATE MACHINE ============
		const state = {
		  token: localStorage.getItem('cvg_token') || '',
		  currentBase64Id: '',
		  viewerEmail: '',
		  viewerRole: '',
		  attachmentPreviewUrl: '',
		  attachmentPreviewName: '',
		  attachmentPreviewMime: '',
		  currentTab: 'all',
		  allRows: [],
		  
		  // Filter & Sorting State [1]
		  searchQuery: '',
		  statusFilter: 'ALL',
		  sortKey: 'dateSubmitted',
		  sortAsc: false
		};

		const EXTERNAL_FORM_BASE = 'https://docs.google.com/forms/d/e/REPLACE_WITH_FORM_ID/viewform?entry.1697204481=';

		// ============ APPLICATION INIT ============
		window.addEventListener('DOMContentLoaded', function () {
		  const initialParam = "<?= initialParam ?>";
		  showView('view-loading'); 
		  
		  setupInteractiveFilters(); // Register filters and sort controls
			setupAttachmentViewerControls();

			cleanAddressBar();

		  google.script.run
			.withSuccessHandler(handleServerResponse)
			.withFailureHandler(handleServerFailure)
			.authenticateAndFetch(state.token, initialParam);
		});

			function setupAttachmentViewerControls() {
			  const viewer = document.getElementById('attachment-viewer');
			  const closeButton = document.getElementById('attachment-viewer-close');

			  if (viewer) {
				viewer.addEventListener('click', function (event) {
				  if (event.target === viewer) {
					closeAttachmentPreview();
				  }
				});
			  }

			  if (closeButton) {
				closeButton.addEventListener('click', closeAttachmentPreview);
			  }

			  window.addEventListener('keydown', function (event) {
				if (event.key === 'Escape') {
				  closeAttachmentPreview();
				}
			  });
			}

		// ============ ROUTER & HANDLERS ============
		function handleServerResponse(response) {
		  if (!response || response.status === 'ERROR') {
			showError(response && response.message ? response.message : 'Unexpected execution error.');
			return;
		  }

		  if (response.viewerEmail && response.viewerRole) {
			state.viewerEmail = response.viewerEmail;
			state.viewerRole = response.viewerRole;
			updateHeaderMetrics(response.viewerEmail, response.viewerRole);
		  }

		  if (response.status === 'SAVE_TOKEN') {
			state.token = response.token;
			localStorage.setItem('cvg_token', response.token);
			cleanAddressBar();
			renderResolved(response);
			return;
		  }

		  if (response.status === 'REQUIRE_AUTH') {
			cleanAddressBar();
			showAuthRequired(response.base64requestid, response.appBUrl);
			return;
		  }

		  if (response.status === 'RENDER_DATA') {
			cleanAddressBar();
			renderResolved(response);
			return;
		  }
		}

		function handleServerFailure(error) {
			cleanAddressBar();
		  showError(error && error.message ? error.message : 'Failed to synchronize with server. Please refresh.');
		}

		function renderResolved(response) {
		  state.allRows = Array.isArray(response.data) ? response.data : [response.data];
		  
		  let containerId = 'container-requestor';
		  let viewModule = RequestorView;
		  
		  if (state.viewerRole === 'Tester') {
			containerId = 'container-tester';
			viewModule = TesterView;
		  } else if (state.viewerRole === 'Approver') {
			containerId = 'container-approver';
			viewModule = ApproverView;
		  }
		  
		  showView(containerId);
		  viewModule.initModule();

		  if (response.isDashboard) {
			document.getElementById('global-filter-bar').classList.remove('hidden-view');
			viewModule.renderDashboard(getProcessedRows(), { preFiltered: true });
		  } else {
			document.getElementById('global-filter-bar').classList.add('hidden-view');
			state.currentBase64Id = urlSafeB64(btoa(response.data.requestId));
			viewModule.renderDetails(response.data);
		  }
		}

		function cleanAddressBar() {
		  try {
			google.script.history.replace({}, {}, '');
		  } catch (e) { /* no-op */ }
		}

		// ============ CENTRALIZED VIEW ROUTER ============
		function showView(viewId) {
		  const views = ['view-loading', 'view-auth', 'view-error', 'container-requestor', 'container-tester', 'container-approver'];
		  views.forEach(function (id) {
			document.getElementById(id).classList.add('hidden-view');
		  });
		  
		  document.getElementById(viewId).classList.remove('hidden-view');
		  
		  const isAppWorkspace = (viewId === 'container-requestor' || viewId === 'container-tester' || viewId === 'container-approver');
		  const header = document.getElementById('app-header');
		  const footer = document.getElementById('app-footer');
		  
		  if (header) {
			if (isAppWorkspace) header.classList.remove('hidden-view');
			else header.classList.add('hidden-view');
		  }
		  if (footer) {
			if (isAppWorkspace) footer.classList.remove('hidden-view');
			else footer.classList.add('hidden-view');
		  }
		  
		  if (!isAppWorkspace) {
			document.getElementById('global-filter-bar').classList.add('hidden-view');
		  }
		}

		// ============ DYNAMIC HEADER MANAGEMENT ============
		function updateHeaderMetrics(email, role) {
		  const emailElement = document.getElementById('user-identity');
		  const roleTextElement = document.getElementById('role-indicator-text');
		  const roleElement = document.getElementById('role-indicator');

		  if (emailElement) {
			emailElement.textContent = email || 'No Active Session';
		  }
		  
		  if (roleTextElement) {
			roleTextElement.textContent = role || 'Requestor';
		  }

		  if (roleElement) {
			roleElement.className = "inline-flex items-center gap-1.5 text-[11px] font-semibold uppercase tracking-wider px-2.5 py-1 rounded-lg transition-all duration-300 border";
			
			if (role === 'Approver') {
			  roleElement.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
			} else if (role === 'Tester') {
			  roleElement.classList.add('bg-teal-50', 'text-teal-700', 'border-teal-200');
			} else {
			  roleElement.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200');
			}
		  }
		}

		// ============ INTERACTIVE FILTER CONTROL BINDINGS ============
		function setupInteractiveFilters() {
		  // 1. Text Search Input Listener
		  document.getElementById('dashboard-search').addEventListener('input', function (e) {
			state.searchQuery = e.target.value;
			handleFilterInput();
		  });
		  
		  // 2. Status Dropdown Select Listener
		  document.getElementById('dashboard-status-filter').addEventListener('change', function (e) {
			state.statusFilter = e.target.value;
			handleFilterInput();
		  });

		  // 3. Queue Refresh Button Listener
		  document.getElementById('btn-refresh-queue').addEventListener('click', function() {
			showView('view-loading');
			google.script.run
			  .withSuccessHandler(handleServerResponse)
			  .withFailureHandler(handleServerFailure)
			  .authenticateAndFetch(state.token, '');
		  });
		}

		/**
		 * Executes filters and routes the painted rows back to the active module
		 */
		function handleFilterInput() {
		  const processed = getProcessedRows();
		  if (state.viewerRole === 'Tester') {
			TesterView.renderDashboard(processed, { preFiltered: true });
		  } else if (state.viewerRole === 'Approver') {
			ApproverView.renderDashboard(processed, { preFiltered: true });
		  } else {
			RequestorView.renderDashboard(processed, { preFiltered: true });
		  }
		}

		/**
		 * Unified processor executing Search, Status Filtering, and Sort Rules [1]
		 */
		function getProcessedRows() {
		  let rows = [];
		  if (state.viewerRole === 'Tester') {
			rows = TesterView.getFilteredDataset(state.allRows);
		  } else if (state.viewerRole === 'Approver') {
			rows = ApproverView.getFilteredDataset(state.allRows);
		  } else {
			rows = state.allRows; // Requestor path
		  }
		  
		  // 1. Text Search Input Filtering
		  const query = String(state.searchQuery || '').trim().toLowerCase();
		  if (query) {
			rows = rows.filter(function (row) {
			  return String(row.requestId || '').toLowerCase().includes(query) ||
					 String(row.requestorName || '').toLowerCase().includes(query) ||
					 String(row.requestorEmail || '').toLowerCase().includes(query) ||
					 String(row.summary || '').toLowerCase().includes(query) ||
					 String(row.requestType || '').toLowerCase().includes(query);
			});
		  }
		  
		  // 2. Status Selector Filtering
		  const statusVal = state.statusFilter;
		  if (statusVal !== 'ALL') {
			rows = rows.filter(function (row) {
			  let currentStatus = String(row.status || '').toLowerCase();
			  let filterStatus = statusVal.toLowerCase();
			  
			  if (filterStatus === 'return for revision') {
				return currentStatus === 'return for revision' || currentStatus === 'returned for revision';
			  }
			  return currentStatus === filterStatus;
			});
		  }
		  
		  // 3. Multi-Column Sorting [1]
		  const key = state.sortKey;
		  const asc = state.sortAsc;
		  
		  rows.sort(function (a, b) {
			let valA = a[key] || '';
			let valB = b[key] || '';
			
			if (key === 'dateSubmitted') {
			  valA = parseChronologicalDate(valA);
			  valB = parseChronologicalDate(valB);
			} else {
			  valA = String(valA).toLowerCase();
			  valB = String(valB).toLowerCase();
			}
			
			if (valA < valB) return asc ? -1 : 1;
			if (valA > valB) return asc ? 1 : -1;
			return 0;
		  });
		  
		  return rows;
		}

		function parseChronologicalDate(dateStr) {
		  const timestamp = Date.parse(dateStr);
		  return isNaN(timestamp) ? 0 : timestamp;
		}

		// ============ OPTIMIZED QUEUE NAVIGATION ============
		function openRequest(requestId) {
		  const cachedRow = state.allRows.find(function(row) {
			return String(row.requestId) === String(requestId);
		  });

		  if (cachedRow) {
			state.currentBase64Id = urlSafeB64(btoa(cachedRow.requestId));
			const viewModule = (state.viewerRole === 'Tester') ? TesterView : (state.viewerRole === 'Approver' ? ApproverView : RequestorView);
			viewModule.renderDetails(cachedRow);
		  } else {
			showView('view-loading');
			const base64Id = btoa(requestId);
			google.script.run
			  .withSuccessHandler(handleServerResponse)
			  .withFailureHandler(handleServerFailure)
			  .authenticateAndFetch(state.token, urlSafeB64(base64Id));
		  }
		}

		function submitDecision(payload) {
		  showView('view-loading');
		  google.script.run
			.withSuccessHandler(function (updatedRow) {
			  if (updatedRow && updatedRow.error) {
				toast('Failed to submit decision: ' + updatedRow.error, true);
				const activeContainer = (state.viewerRole === 'Tester') ? 'container-tester' : (state.viewerRole === 'Approver' ? 'container-approver' : 'container-requestor');
				showView(activeContainer);
				if (state.viewerRole === 'Tester') {
				  TesterView.renderDashboard(getProcessedRows(), { preFiltered: true });
				} else if (state.viewerRole === 'Approver') {
				  ApproverView.renderDashboard(getProcessedRows(), { preFiltered: true });
				} else {
				  RequestorView.renderDashboard(getProcessedRows(), { preFiltered: true });
				}
				return;
  			  }

			  toast('Decision successfully submitted.');
			  
			  const idx = state.allRows.findIndex(row => String(row.requestId) === String(updatedRow.requestId));
			  if (idx !== -1) {
				state.allRows[idx] = updatedRow;
			  }
			  
			  const viewModule = (state.viewerRole === 'Tester') ? TesterView : (state.viewerRole === 'Approver' ? ApproverView : RequestorView);
			  const activeContainer = (state.viewerRole === 'Tester') ? 'container-tester' : (state.viewerRole === 'Approver' ? 'container-approver' : 'container-requestor');
			  showView(activeContainer);
			  viewModule.renderDetails(updatedRow);
			})
			.withFailureHandler(function (err) {
			  toast('Failed to submit decision: ' + err.message, true);
			  const activeContainer = (state.viewerRole === 'Tester') ? 'container-tester' : (state.viewerRole === 'Approver' ? 'container-approver' : 'container-requestor');
			  showView(activeContainer);
			  if (state.viewerRole === 'Tester') {
				TesterView.renderDashboard(getProcessedRows(), { preFiltered: true });
			  } else if (state.viewerRole === 'Approver') {
				ApproverView.renderDashboard(getProcessedRows(), { preFiltered: true });
			  } else {
				RequestorView.renderDashboard(getProcessedRows(), { preFiltered: true });
			  }
			})
			.submitReviewDecision(state.token, state.currentBase64Id, payload);
		}

		function addAdditionalApprover(email) {
		  showView('view-loading');
		  google.script.run
			.withSuccessHandler(function(updatedRow) {
			  if (updatedRow && updatedRow.error) {
				toast('Failed to add approver: ' + updatedRow.error, true);
			  } else {
				toast('Successfully added ' + email + ' as an approver.');
				const idx = state.allRows.findIndex(row => String(row.requestId) === String(updatedRow.requestId));
				if (idx !== -1) {
				  state.allRows[idx] = updatedRow;
				}
			  }
			  showView('container-approver');
			  ApproverView.renderDetails(updatedRow);
			})
			.withFailureHandler(function(err) {
			  toast('Failed to add approver: ' + err.message, true);
			  showView('container-approver');
			})
			.addAdditionalApprover(state.token, state.currentBase64Id, email);
		}

		function submitAdditionalDecision(payload) {
		  showView('view-loading');
		  google.script.run
			.withSuccessHandler(function(updatedRow) {
			  if (updatedRow && updatedRow.error) {
				toast('Failed to submit decision: ' + updatedRow.error, true);
			  } else {
				toast('Your decision has been successfully submitted.');
				const idx = state.allRows.findIndex(row => String(row.requestId) === String(updatedRow.requestId));
				if (idx !== -1) {
				  state.allRows[idx] = updatedRow;
				}
			  }
			  showView('container-approver');
			  ApproverView.renderDetails(updatedRow);
			})
			.withFailureHandler(function(err) {
			  toast('Failed to submit decision: ' + err.message, true);
			  showView('container-approver');
			  const cachedRow = state.allRows.find(function(row) {
				return urlSafeB64(btoa(row.requestId)) === state.currentBase64Id;
			  });
			  if (cachedRow) {
				ApproverView.renderDetails(cachedRow);
			  }
			})
			.submitAdditionalApproverDecision(state.token, state.currentBase64Id, payload);
		}

		function handleCancel() {
		  showView('view-loading');
		  google.script.run
			.withSuccessHandler(function (updatedRow) {
			  if (updatedRow && updatedRow.error) {
				toast('Could not cancel this request: ' + updatedRow.error, true);
				showView('container-requestor');
				RequestorView.renderDashboard(getProcessedRows(), { preFiltered: true });
				return;
			  }
			  toast('Submission successfully cancelled.');
			  
			  const idx = state.allRows.findIndex(row => String(row.requestId) === String(updatedRow.requestId));
			  if (idx !== -1) {
				state.allRows[idx] = updatedRow;
			  }
			  
			  showView('container-requestor');
			  RequestorView.renderDetails(updatedRow);
			})
			.withFailureHandler(function (err) {
			  toast('Could not cancel this request: ' + err.message, true);
			  showView('container-requestor');
			  RequestorView.renderDashboard(getProcessedRows(), { preFiltered: true });
			})
			.cancelRequest(state.token, state.currentBase64Id);
		}

		function showAuthRequired(base64requestid, appBUrl) {
		  showView('view-auth');
		  const btn = document.getElementById('btn-auth-redirect');
		  btn.onclick = function () {
			window.top.location.href = appBUrl + '?dXJsX3BhcmFt=' + encodeURIComponent(base64requestid);
		  };
		}

		function showError(message) {
			cleanAddressBar();
		  showView('view-error');
		  document.getElementById('error-message').textContent = message;
		}
	  </script>
	</body>
	</html>
