<header id="app-header" class="hidden-view sticky top-0 z-50 h-[56px] flex items-center justify-between px-6 bg-white/85 backdrop-blur-md border-b border-gray-200/70 select-none">
  <div class="flex items-center gap-3.5">
    <!-- Dynamic Brand Image Logo -->
    <img class="h-6 w-auto object-contain" src="https://raw.githubusercontent.com/Frijaaay/cdn/refs/heads/main/src/converge/logos/logo_teal.png" alt="Converge Logo">

    <div class="h-4 w-[1px] bg-gray-200"></div>

    <span class="text-sm font-semibold text-gray-800 tracking-tight">Test Request Space</span>

    <!-- Dynamic role-specific tab container -->
    <nav id="header-nav" class="flex items-center gap-1 ml-1"></nav>
  </div>

  <div class="flex items-center gap-3">
    <!-- Live status pulse + Context Indicator -->
    <span id="role-indicator" class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-brand-600 uppercase tracking-wider bg-brand-50 px-2.5 py-1 rounded-lg border border-brand-200/60">
      <span class="w-1.5 h-1.5 rounded-full bg-current" style="animation: pulse-dot 2s ease-in-out infinite;"></span>
      <span id="role-indicator-text">...</span>
    </span>

    <div class="h-4 w-[1px] bg-gray-200"></div>

    <!-- Dynamic Email Identity with avatar -->
    <div class="flex items-center gap-2">
      <span id="user-identity" class="text-[13px] font-mono-cvg font-medium text-gray-600 hidden sm:inline">...</span>
    </div>
  </div>
</header>
