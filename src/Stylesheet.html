<style>
  /* Typography & Sticky Footer Base Layout */
  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 400;
    color: #6b7280;
    min-height: 100vh;
    display: flex;         
    flex-direction: column; 
    background-color: #f8fafc; 
    background-image:
      linear-gradient(rgba(4, 137, 134, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(4, 137, 134, 0.05) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .font-mono-cvg {
    font-family: 'DM Mono', monospace;
  }

  /* Page / Section Titles */
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #111827;
  }

  /* Data Field Labels */
  .data-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #9ca3af;
    width: 200px;
    flex-shrink: 0;
  }

  /* Data Field Values */
  .data-val {
    font-size: 13.5px;
    font-weight: 500;
    color: #111827;
  }

  /* Custom Glassmorphic Cards */
  .cvg-card {
    background: rgba(255, 255, 255, 0.75);
    border: 1px solid rgba(0, 0, 0, 0.07);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .cvg-card:hover {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    transform: translateY(-1px);
  }

  /* Interactive Inputs (Textarea) */
  .cvg-textarea {
    border-radius: 10px;
    border: 1.5px solid rgba(0, 0, 0, 0.1);
    background: rgba(255, 255, 255, 0.85);
    font-size: 13.5px;
    color: #111827;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .cvg-textarea:focus {
    border-color: #048986;
    box-shadow: 0 0 0 3px rgba(4, 137, 134, 0.13);
    outline: none;
  }
  .cvg-textarea::placeholder {
    color: #9ca3af;
  }

  /* Action Buttons */
  .btn-primary {
    background: #048986;
    color: white;
    padding: 10px 22px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13.5px;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn-primary:hover:not(:disabled) {
    background: #036e6b;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(4, 137, 134, 0.3);
  }
  .btn-primary:active:not(:disabled) {
    transform: translateY(0);
  }
  .btn-primary:disabled {
    opacity: 0.38;
    cursor: not-allowed;
  }

  .btn-danger {
    background: #dc2626;
    color: white;
    padding: 10px 22px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13.5px;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn-danger:hover:not(:disabled) {
    background: #b91c1c;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(220, 38, 38, 0.3);
  }
  .btn-danger:active:not(:disabled) {
    transform: translateY(0);
  }
  .btn-danger:disabled {
    opacity: 0.38;
    cursor: not-allowed;
  }

  /* Dynamic Badges styling */
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid;
    display: inline-flex;
    align-items: center;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-submitted, .badge-pending {
    color: #1d4ed8;
    background: #eff6ff;
    border-color: #bfdbfe;
  }
  .badge-testing, .badge-verified {
    color: #0f766e;
    background: #f0fdfa;
    border-color: #99f6e4;
  }
  .badge-approved, .badge-completed, .badge-passed {
    color: #15803d;
    background: #f0fdf4;
    border-color: #bbf7d0;
  }
  .badge-returned, .badge-rejected, .badge-cancelled {
    color: #b91c1c;
    background: #fef2f2;
    border-color: #fecaca;
  }
  .badge-resubmitted, .badge-draft {
    color: #b45309;
    background: #fffbeb;
    border-color: #fde68a;
  }

  /* Sliding Premium Toast notifications */
  #toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: #111827;
    color: white;
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    pointer-events: auto;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .toast-success {
    background: #048986;
  }
  .toast-error {
    background: #dc2626;
  }

  /* Interactive Selection Cards */
  .review-choice {
    border: 1.5px solid rgba(0,0,0,0.08);
    background: white;
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
    font-size: 13px;
    color: #4b5563;
  }
  .review-choice:hover {
    border-color: rgba(4,137,134,0.35);
    background: rgba(4,137,134,0.03);
  }
  .review-choice.active {
    border-color: #048986;
    background: rgba(4, 137, 134, 0.08);
    color: #036e6b;
    box-shadow: 0 0 0 3px rgba(4,137,134,0.1);
  }

  /* Custom Webkit Scrollbars */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(4, 137, 134, 0.25);
    border-radius: 99px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(4, 137, 134, 0.45);
  }

  /* Core Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .anim-fade-up {
    animation: fadeUp 0.4s ease forwards;
  }
  .hidden-view {
    display: none !important;
  }
</style>
