<style>
  /* ════════════════════════════════════════════════════
     TYPOGRAPHY & BASE LAYOUT
  ════════════════════════════════════════════════════ */
  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 400;
    color: #6b7280;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-color: #f8fafc;
    background-image:
      linear-gradient(rgba(4, 137, 134, 0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(4, 137, 134, 0.045) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .font-mono-cvg { font-family: 'DM Mono', monospace; }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #111827;
    letter-spacing: -0.01em;
  }

  .section-eyebrow {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9ca3af;
  }

  .data-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #9ca3af;
    width: 200px;
    flex-shrink: 0;
  }

  .data-val {
    font-size: 13.5px;
    font-weight: 500;
    color: #111827;
  }

  /* ════════════════════════════════════════════════════
     ICON CHIPS — standard section-header pattern
  ════════════════════════════════════════════════════ */
  .icon-chip {
    width: 22px;
    height: 22px;
    border-radius: 7px;
    background: rgba(4, 137, 134, 0.10);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-chip svg { width: 12px; height: 12px; color: #048986; }

  .icon-chip-amber { background: rgba(217, 119, 6, 0.10); }
  .icon-chip-amber svg { color: #b45309; }
  .icon-chip-red { background: rgba(220, 38, 38, 0.10); }
  .icon-chip-red svg { color: #dc2626; }
  .icon-chip-green { background: rgba(21, 128, 61, 0.10); }
  .icon-chip-green svg { color: #15803d; }

  /* ════════════════════════════════════════════════════
     CARDS
  ════════════════════════════════════════════════════ */
  .cvg-card {
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(0, 0, 0, 0.07);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .cvg-card:hover {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    transform: translateY(-1px);
  }

  /* Sticky summary card (detail view, left column) */
  .cvg-card-sticky {
    position: sticky;
    top: 84px;
  }

  /* ════════════════════════════════════════════════════
     STATUS RAIL SYSTEM — the signature element
     A 3–4px colored bar that travels from dashboard row
     to detail header to action panel, tying state together.
  ════════════════════════════════════════════════════ */
  .rail {
    position: relative;
  }
  .rail::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--rail-color, #d1d5db);
  }
  .rail-submitted, .rail-pending          { --rail-color: #1d4ed8; }
  .rail-testing, .rail-verified           { --rail-color: #0f766e; }
  .rail-approved, .rail-completed,
  .rail-passed                            { --rail-color: #15803d; }
  .rail-returned, .rail-rejected,
  .rail-cancelled                         { --rail-color: #b91c1c; }
  .rail-resubmitted, .rail-draft          { --rail-color: #b45309; }

  /* ════════════════════════════════════════════════════
     DASHBOARD ROW (card-in-row hybrid, replaces plain <tr>)
  ════════════════════════════════════════════════════ */
  .qrow {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 20px;
    padding: 16px 20px 16px 22px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    transition: background 0.15s ease;
    cursor: pointer;
  }
  .qrow:last-child { border-bottom: none; }
  .qrow:hover { background: rgba(4, 137, 134, 0.035); }

  .qrow-id {
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    font-weight: 500;
    color: #374151;
  }
  .qrow-title {
    font-size: 13.5px;
    font-weight: 600;
    color: #111827;
    line-height: 1.3;
  }
  .qrow-sub {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 2px;
  }
  .qrow-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .qrow-date {
    font-size: 11.5px;
    color: #9ca3af;
    font-family: 'DM Mono', monospace;
  }
  .qrow-arrow {
    width: 26px;
    height: 26px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    background: transparent;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }
  .qrow:hover .qrow-arrow {
    background: rgba(4, 137, 134, 0.10);
    color: #048986;
    transform: translateX(2px);
  }

  /* ════════════════════════════════════════════════════
     META CHIPS — small inline data tags on dashboard rows
  ════════════════════════════════════════════════════ */
  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    color: #6b7280;
    background: rgba(0, 0, 0, 0.035);
    padding: 3px 8px;
    border-radius: 6px;
  }

  /* ════════════════════════════════════════════════════
     INTERACTIVE INPUTS
  ════════════════════════════════════════════════════ */
  .cvg-textarea {
    border-radius: 10px;
    border: 1.5px solid rgba(0, 0, 0, 0.1);
    background: rgba(255, 255, 255, 0.85);
    font-size: 13.5px;
    color: #111827;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .cvg-textarea:focus {
    border-color: #048986;
    box-shadow: 0 0 0 3px rgba(4, 137, 134, 0.13);
    outline: none;
  }
  .cvg-textarea::placeholder { color: #9ca3af; }

  /* ════════════════════════════════════════════════════
     BUTTONS
  ════════════════════════════════════════════════════ */
  .btn-primary {
    background: #048986;
    color: white;
    padding: 10px 22px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13.5px;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary:hover:not(:disabled) {
    background: #036e6b;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(4, 137, 134, 0.3);
  }
  .btn-primary:active:not(:disabled) { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; }

  .btn-danger {
    background: #dc2626;
    color: white;
    padding: 10px 22px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13.5px;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-danger:hover:not(:disabled) {
    background: #b91c1c;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(220, 38, 38, 0.3);
  }
  .btn-danger:active:not(:disabled) { transform: translateY(0); }
  .btn-danger:disabled { opacity: 0.38; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: #6b7280;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13px;
    border: 1.5px solid rgba(0, 0, 0, 0.08);
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-ghost:hover {
    border-color: rgba(4, 137, 134, 0.35);
    background: rgba(4, 137, 134, 0.03);
    color: #048986;
  }

  /* ════════════════════════════════════════════════════
     BADGES
  ════════════════════════════════════════════════════ */
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .badge-submitted, .badge-pending {
    color: #1d4ed8; background: #eff6ff; border-color: #bfdbfe;
  }
  .badge-testing, .badge-verified {
    color: #0f766e; background: #f0fdfa; border-color: #99f6e4;
  }
  .badge-approved, .badge-completed, .badge-passed {
    color: #15803d; background: #f0fdf4; border-color: #bbf7d0;
  }
  .badge-returned, .badge-rejected, .badge-cancelled {
    color: #b91c1c; background: #fef2f2; border-color: #fecaca;
  }
  .badge-resubmitted, .badge-draft {
    color: #b45309; background: #fffbeb; border-color: #fde68a;
  }

  /* ════════════════════════════════════════════════════
     EMPTY STATES
  ════════════════════════════════════════════════════ */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
  }
  .empty-state .icon-chip {
    width: 44px; height: 44px;
    border-radius: 14px;
    margin: 0 auto 16px;
  }
  .empty-state .icon-chip svg { width: 20px; height: 20px; }
  .empty-state h4 {
    font-size: 13.5px;
    font-weight: 600;
    color: #4b5563;
    margin-bottom: 4px;
  }
  .empty-state p {
    font-size: 12.5px;
    color: #9ca3af;
    max-width: 280px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* ════════════════════════════════════════════════════
     TOASTS
  ════════════════════════════════════════════════════ */
  #toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: #111827;
    color: white;
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    pointer-events: auto;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .toast-success { background: #048986; }
  .toast-error { background: #dc2626; }

  /* ════════════════════════════════════════════════════
     SELECTION CARDS (review-choice + new action-tile)
  ════════════════════════════════════════════════════ */
  .review-choice {
    border: 1.5px solid rgba(0,0,0,0.08);
    background: white;
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
    font-size: 13px;
    color: #4b5563;
  }
  .review-choice:hover {
    border-color: rgba(4,137,134,0.35);
    background: rgba(4,137,134,0.03);
  }
  .review-choice.active {
    border-color: #048986;
    background: rgba(4, 137, 134, 0.08);
    color: #036e6b;
    box-shadow: 0 0 0 3px rgba(4,137,134,0.1);
  }

  /* Larger action tile with icon + description, used in detail-view action rails */
  .action-tile {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border: 1.5px solid rgba(0,0,0,0.08);
    background: white;
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
  }
  .action-tile:hover {
    border-color: rgba(4,137,134,0.35);
    background: rgba(4,137,134,0.03);
    transform: translateY(-1px);
  }
  .action-tile.active {
    border-color: #048986;
    background: rgba(4,137,134,0.07);
    box-shadow: 0 0 0 3px rgba(4,137,134,0.10);
  }
  .action-tile.active-danger {
    border-color: #dc2626;
    background: rgba(220,38,38,0.05);
    box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
  }
  .action-tile-title {
    font-size: 13px;
    font-weight: 600;
    color: #111827;
  }
  .action-tile-sub {
    font-size: 11.5px;
    color: #9ca3af;
    margin-top: 1px;
    line-height: 1.4;
  }

  /* ════════════════════════════════════════════════════
     ATTACHMENT FILE CHIPS
  ════════════════════════════════════════════════════ */
  .file-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.07);
    background: rgba(255,255,255,0.7);
    transition: all 0.15s ease;
    width: 100%;
    text-align: left;
    cursor: pointer;
  }
  .file-chip:hover {
    border-color: rgba(4,137,134,0.35);
    background: rgba(4,137,134,0.04);
  }
  .file-chip-ext {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 5px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    background: rgba(0,0,0,0.06);
    color: #6b7280;
    flex-shrink: 0;
  }

  /* ════════════════════════════════════════════════════
     SCROLLBARS
  ════════════════════════════════════════════════════ */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(4, 137, 134, 0.25); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(4, 137, 134, 0.45); }

  /* ════════════════════════════════════════════════════
     ANIMATIONS
  ════════════════════════════════════════════════════ */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes checkPop { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }

  .anim-fade-up { animation: fadeUp 0.4s ease forwards; }
  .anim-fade-up-1 { animation: fadeUp 0.4s ease forwards; animation-delay: 0.04s; }
  .anim-fade-up-2 { animation: fadeUp 0.4s ease forwards; animation-delay: 0.08s; }
  .anim-fade-up-3 { animation: fadeUp 0.4s ease forwards; animation-delay: 0.12s; }

  .hidden-view { display: none !important; }
</style>
